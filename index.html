<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ρηματικό Καλοκαίρι · Stamenou Education</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Source+Sans+3:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --sage:#7A9471;
  --sage-dark:#5E7355;
  --sage-light:#E4EBE0;
  --sienna:#C17F59;
  --sienna-dark:#A6643F;
  --ink:#2B2E26;
  --cream:#FAF7F0;
  --cream-deep:#F1ECE0;
  --paper:#FFFFFF;
  --success:#7FAE5C;
  --success-bg:#EAF3E2;
  --error:#D4806B;
  --error-bg:#FBEAE4;
  --gold:#D6A24C;
  --shadow-sm: 0 2px 6px rgba(43,46,38,0.06);
  --shadow-md: 0 6px 18px rgba(43,46,38,0.10);
  --shadow-btn: 0 4px 0 rgba(0,0,0,0.12);
  --radius-lg: 22px;
  --radius-md: 16px;
  --radius-sm: 10px;
  --font-display: 'Cormorant Garamond', serif;
  --font-body: 'Source Sans 3', sans-serif;
}

*{box-sizing:border-box; margin:0; padding:0;}
html,body{
  font-family: var(--font-body);
  background: var(--cream);
  color: var(--ink);
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
}
body{
  background-image:
    radial-gradient(circle at 8% 8%, rgba(122,148,113,0.07) 0%, transparent 38%),
    radial-gradient(circle at 92% 88%, rgba(193,127,89,0.08) 0%, transparent 42%);
  overflow-x:hidden;
}
img,svg{display:block;}
button{font-family:inherit; cursor:pointer; border:none; background:none;}
input{font-family:inherit;}
a{color:inherit; text-decoration:none;}

.app{max-width:480px; margin:0 auto; min-height:100vh; position:relative; display:flex; flex-direction:column;}

/* ---------- Loading screen ---------- */
.boot{display:flex; align-items:center; justify-content:center; min-height:100vh; flex-direction:column; gap:14px;}
.boot-leaf{width:46px;height:46px;opacity:0.5; animation:spin 1.4s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.boot p{color:var(--sage-dark); font-size:0.95rem;}

/* ---------- Top bar ---------- */
.topbar{
  position:sticky; top:0; z-index:20;
  display:flex; align-items:center; justify-content:space-between;
  padding: 14px 18px;
  background: rgba(250,247,240,0.92);
  backdrop-filter: blur(6px);
  border-bottom: 1px solid rgba(43,46,38,0.06);
}
.brand{display:flex; align-items:center; gap:9px;}
.brand-mark{width:30px;height:30px; flex-shrink:0;}
.brand-text{font-family:var(--font-display); font-weight:600; font-size:1.18rem; color:var(--ink); letter-spacing:0.2px;}
.brand-text small{display:block; font-family:var(--font-body); font-weight:600; font-size:0.56rem; letter-spacing:1.6px; text-transform:uppercase; color:var(--sage-dark); margin-top:-2px;}

.topbar-stats{display:flex; align-items:center; gap:10px;}
.pill{
  display:flex; align-items:center; gap:5px;
  background:var(--paper); border-radius:999px; padding:6px 11px;
  box-shadow: var(--shadow-sm);
  font-weight:700; font-size:0.92rem; color:var(--ink);
}
.pill.streak{color:var(--sienna-dark);}
.pill .ic{font-size:1rem; line-height:1;}
.logout-btn{
  display:flex; align-items:center; justify-content:center;
  width:34px; height:34px; border-radius:50%;
  color: var(--sage-dark); opacity:0.65;
}
.logout-btn:hover{opacity:1; background:var(--sage-light);}

/* ---------- Generic screen container ---------- */
.screen{flex:1; display:flex; flex-direction:column; padding: 22px 20px 100px;}
.screen.center{align-items:center; justify-content:center; text-align:center;}
.hidden{display:none !important;}

/* ---------- Login screen ---------- */
.login-wrap{display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:32px 24px; gap:0;}
.login-mark{width:74px; height:74px; margin-bottom:18px;}
.login-title{font-family:var(--font-display); font-weight:600; font-size:2.1rem; color:var(--ink); text-align:center; line-height:1.15;}
.login-sub{font-family:var(--font-body); font-size:0.95rem; color:var(--sage-dark); margin-top:6px; margin-bottom:8px; text-align:center; font-weight:600;}
.login-dates{font-size:0.82rem; color:#8a8a7a; margin-bottom:30px; text-align:center;}

.login-card{
  width:100%; max-width:360px; background:var(--paper); border-radius:var(--radius-lg);
  padding:26px 24px 28px; box-shadow:var(--shadow-md); display:flex; flex-direction:column; gap:16px;
}
.field-label{font-size:0.82rem; font-weight:700; color:var(--ink); margin-bottom:6px; display:block;}
.field-input{
  width:100%; padding:13px 16px; border-radius:var(--radius-sm);
  border:2px solid var(--cream-deep); background:var(--cream); font-size:1.05rem;
  color:var(--ink); font-weight:600; letter-spacing:0.3px;
  transition: border-color 0.15s ease;
}
.field-input:focus{outline:none; border-color:var(--sage);}
.field-input.pin{letter-spacing:6px; text-align:center; font-family:var(--font-display); font-size:1.4rem;}

.btn{
  display:flex; align-items:center; justify-content:center; gap:8px;
  border-radius:999px; padding:15px 20px; font-weight:800; font-size:1rem;
  letter-spacing:0.2px; transition: transform 0.08s ease, box-shadow 0.08s ease; user-select:none;
}
.btn:active{transform:translateY(2px); box-shadow:none !important;}
.btn-primary{background:var(--sage); color:#fff; box-shadow: 0 4px 0 var(--sage-dark);}
.btn-primary:disabled{background:#cfd6c9; box-shadow:0 4px 0 #bcc4b4; color:#fff; cursor:not-allowed;}
.btn-secondary{background:var(--paper); color:var(--ink); box-shadow:0 4px 0 var(--cream-deep); border:2px solid var(--cream-deep);}
.btn-ghost{background:transparent; color:var(--sage-dark); font-weight:700; padding:10px;}
.btn-sienna{background:var(--sienna); color:#fff; box-shadow:0 4px 0 var(--sienna-dark);}
.btn-block{width:100%;}
.btn-sm{padding:9px 16px; font-size:0.85rem;}

.login-error{
  color:var(--error); background:var(--error-bg); border-radius:var(--radius-sm);
  padding:10px 14px; font-size:0.86rem; font-weight:600; text-align:center;
}
.login-foot{margin-top:28px; font-size:0.78rem; color:#9a9a8a; text-align:center;}
.admin-hatch{
  position:fixed; bottom:10px; right:14px; width:34px; height:34px;
  opacity:0.18; border-radius:50%;
}
.admin-hatch:active{opacity:0.4;}

/* ---------- Home screen ---------- */
.hello{font-family:var(--font-display); font-weight:600; font-size:1.65rem; color:var(--ink); margin-bottom:2px;}
.hello-sub{color:#7c7c6c; font-size:0.92rem; margin-bottom:22px;}

.progress-ring-wrap{display:flex; align-items:center; gap:16px; background:var(--paper); border-radius:var(--radius-lg); padding:18px 20px; box-shadow:var(--shadow-sm); margin-bottom:18px;}
.progress-ring{width:64px; height:64px; flex-shrink:0;}
.progress-ring-info{flex:1;}
.progress-ring-info .big{font-family:var(--font-display); font-weight:700; font-size:1.5rem; color:var(--ink); line-height:1;}
.progress-ring-info .small{font-size:0.82rem; color:#8a8a7a; margin-top:3px;}

.day-strip{display:flex; gap:7px; overflow-x:auto; padding:4px 2px 14px; margin:0 -2px 6px; scrollbar-width:none;}
.day-strip::-webkit-scrollbar{display:none;}
.day-dot{
  flex-shrink:0; width:38px; height:48px; border-radius:12px;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px;
  background:var(--paper); border:2px solid var(--cream-deep); font-size:0.68rem; font-weight:700; color:#9a9a8a;
}
.day-dot .num{font-size:0.86rem; font-family:var(--font-display); font-weight:700;}
.day-dot.done{background:var(--sage); border-color:var(--sage-dark); color:#fff;}
.day-dot.today{border-color:var(--sienna); color:var(--sienna-dark); box-shadow:0 0 0 3px rgba(193,127,89,0.15);}
.day-dot.today .num{color:var(--sienna-dark);}

.section-title{font-family:var(--font-display); font-weight:600; font-size:1.2rem; color:var(--ink); margin: 18px 0 12px; display:flex; align-items:center; justify-content:space-between;}
.section-title span.count{font-family:var(--font-body); font-size:0.78rem; color:#9a9a8a; font-weight:600;}

.verb-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:10px;}
.verb-tile{
  background:var(--paper); border-radius:var(--radius-md); padding:14px 8px 12px;
  display:flex; flex-direction:column; align-items:center; gap:6px;
  box-shadow:var(--shadow-sm); position:relative; border:2px solid transparent;
}
.verb-tile.locked{opacity:0.5;}
.verb-tile.mastered{border-color:var(--sage);}
.verb-tile .lemma{font-family:var(--font-display); font-weight:600; font-size:1.05rem; color:var(--ink); text-align:center; line-height:1.15;}
.verb-tile .day-tag{font-size:0.62rem; font-weight:700; color:#a3a395; text-transform:uppercase; letter-spacing:0.4px;}
.verb-tile .badge{position:absolute; top:-6px; right:-6px; width:20px; height:20px;}
.verb-tile .lock-ic{position:absolute; top:8px; right:8px; opacity:0.4;}

.cta-floating{position:sticky; bottom:0; left:0; right:0; padding:14px 20px 22px; background:linear-gradient(to top, var(--cream) 60%, transparent); margin-top:auto;}

/* ---------- Bottom nav ---------- */
.bottom-nav{
  position:sticky; bottom:0; z-index:20; display:flex; background:var(--paper);
  border-top:1px solid rgba(43,46,38,0.07); padding:8px 6px max(8px, env(safe-area-inset-bottom));
}
.nav-item{flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:7px 4px; border-radius:14px; color:#aaa99a; font-size:0.66rem; font-weight:700;}
.nav-item.active{color:var(--sage-dark);}
.nav-item svg{width:22px; height:22px;}

/* ---------- Verb detail screen ---------- */
.vd-header{display:flex; align-items:center; gap:10px; margin-bottom:6px;}
.back-btn{width:36px; height:36px; display:flex; align-items:center; justify-content:center; border-radius:50%; background:var(--paper); box-shadow:var(--shadow-sm); flex-shrink:0;}
.vd-lemma{font-family:var(--font-display); font-weight:700; font-size:2.1rem; color:var(--ink); line-height:1.1;}
.vd-translation{font-size:1rem; color:var(--sage-dark); font-weight:600; margin: 2px 0 0 46px;}

.fact-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin: 20px 0;}
.fact-box{background:var(--paper); border-radius:var(--radius-md); padding:13px 14px; box-shadow:var(--shadow-sm);}
.fact-box.full{grid-column:1/-1;}
.fact-box .flabel{font-size:0.66rem; font-weight:800; letter-spacing:0.5px; text-transform:uppercase; color:var(--sienna-dark); margin-bottom:4px;}
.fact-box .fvalue{font-size:0.93rem; color:var(--ink); line-height:1.45; font-weight:500;}
.fact-box .fvalue.greek{font-family:var(--font-display); font-size:1.08rem; font-weight:600;}

.carousel-label{font-family:var(--font-display); font-weight:600; font-size:1.1rem; margin: 4px 0 10px; color:var(--ink);}
.tense-carousel{display:flex; gap:12px; overflow-x:auto; scroll-snap-type:x mandatory; padding: 4px 2px 18px; margin: 0 -4px;}
.tense-carousel::-webkit-scrollbar{display:none;}
.tense-card{
  scroll-snap-align:start; flex-shrink:0; width:78%; max-width:280px;
  background:var(--paper); border-radius:var(--radius-lg); padding:18px 18px 16px;
  box-shadow:var(--shadow-md); border-top:5px solid var(--sage);
}
.tense-card .tname{font-size:0.72rem; font-weight:800; text-transform:uppercase; letter-spacing:0.6px; color:var(--sage-dark); margin-bottom:10px;}
.voice-row{margin-bottom:10px;}
.voice-row:last-child{margin-bottom:0;}
.voice-row .vlabel{font-size:0.66rem; font-weight:700; color:#9a9a8a; text-transform:uppercase; letter-spacing:0.4px; margin-bottom:2px;}
.voice-row .vform{font-family:var(--font-display); font-size:1.25rem; font-weight:600; color:var(--ink); line-height:1.3;}

.dots-row{display:flex; justify-content:center; gap:6px; margin-bottom:8px;}
.dots-row .dot{width:6px; height:6px; border-radius:50%; background:var(--cream-deep);}
.dots-row .dot.active{background:var(--sage); width:16px; border-radius:4px; transition:0.2s;}

/* ---------- Quiz screen ---------- */
.quiz-progress-bar{height:10px; border-radius:999px; background:var(--cream-deep); overflow:hidden; margin-bottom:22px;}
.quiz-progress-fill{height:100%; background:var(--sage); border-radius:999px; transition:width 0.3s ease;}
.quiz-q-label{font-size:0.78rem; font-weight:700; color:var(--sienna-dark); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px;}
.quiz-question{font-family:var(--font-display); font-weight:600; font-size:1.45rem; color:var(--ink); line-height:1.3; margin-bottom:26px;}
.quiz-question .hl{color:var(--sage-dark);}
.quiz-input-wrap{margin-bottom:14px;}
.quiz-input{
  width:100%; padding:16px 18px; border-radius:var(--radius-md); border:2.5px solid var(--cream-deep);
  background:var(--paper); font-family:var(--font-display); font-size:1.3rem; font-weight:600; color:var(--ink); text-align:center;
}
.quiz-input:focus{outline:none; border-color:var(--sage);}
.quiz-input.correct{border-color:var(--success); background:var(--success-bg);}
.quiz-input.wrong{border-color:var(--error); background:var(--error-bg);}
.quiz-options{display:flex; flex-direction:column; gap:10px;}
.quiz-option{
  background:var(--paper); border:2.5px solid var(--cream-deep); border-radius:var(--radius-md);
  padding:15px 18px; font-family:var(--font-display); font-size:1.1rem; font-weight:600; color:var(--ink); text-align:left;
}
.quiz-option.correct{border-color:var(--success); background:var(--success-bg); color:#456b34;}
.quiz-option.wrong{border-color:var(--error); background:var(--error-bg); color:#a14b37;}
.quiz-option:disabled{opacity:0.55;}

.feedback-banner{
  position:fixed; left:0; right:0; bottom:0; z-index:30; padding:18px 20px max(18px, env(safe-area-inset-bottom));
  display:flex; align-items:center; justify-content:space-between; gap:14px;
  transform:translateY(110%); transition: transform 0.28s cubic-bezier(.2,.9,.3,1.2);
}
.feedback-banner.show{transform:translateY(0);}
.feedback-banner.ok{background:var(--success-bg);}
.feedback-banner.bad{background:var(--error-bg);}
.feedback-left{display:flex; align-items:center; gap:12px;}
.feedback-icon{width:34px; height:34px; flex-shrink:0;}
.feedback-text{font-weight:800; font-size:1.05rem;}
.feedback-banner.ok .feedback-text{color:#456b34;}
.feedback-banner.bad .feedback-text{color:#a14b37;}
.feedback-sub{font-size:0.82rem; font-weight:500; margin-top:1px;}
.feedback-banner.ok .feedback-sub{color:#5d8047;}
.feedback-banner.bad .feedback-sub{color:#b56750;}

/* ---------- Day complete screen ---------- */
.complete-wrap{display:flex; flex-direction:column; align-items:center; text-align:center; padding-top:6vh;}
.complete-burst{width:140px; height:140px; margin-bottom:8px;}
.complete-title{font-family:var(--font-display); font-weight:700; font-size:1.9rem; color:var(--ink); margin-bottom:6px;}
.complete-sub{color:#7c7c6c; font-size:0.98rem; margin-bottom:26px; max-width:300px;}
.complete-stats{display:flex; gap:12px; width:100%; max-width:340px; margin-bottom:30px;}
.cstat{flex:1; background:var(--paper); border-radius:var(--radius-md); padding:16px 8px; box-shadow:var(--shadow-sm); text-align:center;}
.cstat .cval{font-family:var(--font-display); font-weight:700; font-size:1.5rem; color:var(--sage-dark);}
.cstat .clabel{font-size:0.7rem; color:#9a9a8a; font-weight:700; text-transform:uppercase; letter-spacing:0.3px; margin-top:2px;}

/* ---------- Admin ---------- */
.admin-screen{max-width:760px;}
.admin-topbar{display:flex; align-items:center; justify-content:space-between; padding:16px 20px; background:var(--ink); color:#fff;}
.admin-topbar .brand-text{color:#fff;}
.admin-topbar .brand-text small{color:#cdd8c8;}
.admin-body{padding:20px;}
.admin-search{width:100%; padding:12px 16px; border-radius:var(--radius-sm); border:2px solid var(--cream-deep); margin-bottom:16px; font-size:0.95rem;}
.student-card{background:var(--paper); border-radius:var(--radius-md); padding:16px 18px; box-shadow:var(--shadow-sm); margin-bottom:10px;}
.student-row{display:flex; align-items:center; justify-content:space-between; gap:10px;}
.student-name{font-weight:700; font-size:1.02rem; color:var(--ink);}
.student-meta{font-size:0.78rem; color:#9a9a8a; margin-top:2px;}
.student-stats{display:flex; gap:14px; margin-top:12px; flex-wrap:wrap;}
.sstat{font-size:0.8rem; color:var(--ink); font-weight:600;}
.sstat .sval{color:var(--sage-dark); font-family:var(--font-display); font-weight:700; font-size:1rem;}
.mini-bar{height:6px; border-radius:999px; background:var(--cream-deep); margin-top:10px; overflow:hidden;}
.mini-bar-fill{height:100%; background:var(--sienna); border-radius:999px;}
.admin-empty{text-align:center; padding:60px 20px; color:#9a9a8a;}
.admin-gen-card{background:var(--sage-light); border-radius:var(--radius-md); padding:16px 18px; margin-bottom:18px; display:flex; flex-direction:column; gap:10px;}
.gen-row{display:flex; gap:8px;}
.gen-row input{flex:1; padding:11px 14px; border-radius:var(--radius-sm); border:2px solid #d6e0d0; font-size:0.92rem;}
.gen-list{font-size:0.85rem; color:var(--sage-dark); line-height:1.6;}
.tab-row{display:flex; gap:8px; margin-bottom:18px;}
.tab-btn{padding:9px 16px; border-radius:999px; font-weight:700; font-size:0.85rem; background:var(--paper); color:#9a9a8a; box-shadow:var(--shadow-sm);}
.tab-btn.active{background:var(--sage); color:#fff;}

/* ---------- Toast ---------- */
.toast{
  position:fixed; top:18px; left:50%; transform:translateX(-50%) translateY(-30px); z-index:50;
  background:var(--ink); color:#fff; padding:12px 20px; border-radius:999px; font-size:0.88rem; font-weight:600;
  opacity:0; transition:0.25s ease; box-shadow:var(--shadow-md);
}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

@media (min-width:520px){
  .app{box-shadow: var(--shadow-md); margin-top:0;}
}
</style>
</head>

<div id="root"></div>

<script>

function escapeHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function norm(str){
  // accent / case tolerant comparison for quiz answers
  return String(str || '')
    .toLowerCase()
    .replace(/\([^)]*\)/g,'') // strip parenthetical notes like (-ὲω), (β'), (μτγν.)
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'') // strip accents
    .replace(/ς/g,'σ')
    .replace(/[\s\-'’,.]/g,'')
    .trim();
}
function todayStr(){
  const d = new Date();

function dayIndexForToday(){
  // Returns 1-31 representing which challenge day "today" maps to,
  // purely for display purposes (countdown / streak context).
  const start = new Date('2026-07-01T00:00:00');
  const now = new Date();
  const diff = Math.floor((now - start) / 86400000) + 1;
  if (diff < 1) return 0;
  if (diff > 31) return 31;
  return diff;
}

  let t = document.querySelector('.toast');

async function handleLogin(){
  const name = document.getElementById('loginName').value.trim();
  const pin = document.getElementById('loginPin').value.trim();
  if(!name || !pin){ renderLogin('Συμπλήρωσε όνομα και κωδικό.'); return; }

  if(!student){ renderLogin('Δεν βρέθηκε μαθητής με αυτό το όνομα. Δημιούργησε λογαριασμό παρακάτω.'); return; }
  if(student.pin !== pin){ renderLogin('Λάθος κωδικός. Δοκίμασε ξανά.'); return; }
  await onLoginSuccess(student);
}

async function handleNewStudent(){
  const name = document.getElementById('loginName').value.trim();
  const pin = document.getElementById('loginPin').value.trim();
  if(!name || !pin){ renderLogin('Γράψε το όνομά σου και έναν 4-ψήφιο κωδικό για να ξεκινήσεις.'); return; }
  if(pin.length < 4){ renderLogin('Ο κωδικός πρέπει να έχει 4 ψηφία.'); return; }
  const result = await createStudentRemote(name, pin);
  if(!result.ok){ renderLogin(result.error || 'Κάτι πήγε στραβά. Δοκίμασε ξανά.'); return; }
  await onLoginSuccess(result.student);
}

async function onLoginSuccess(student){
  state.student = student;

  state.screen = 'home';
  render();
}

// streak logic: if last active was yesterday -> +1; if today already -> unchanged; else reset to 1
async function applyStreakLogic(student){
  const today = todayStr();
  if(student.lastActiveDate === today) return; // already counted today
  const y = new Date(); y.setDate(y.getDate()-1);
  const yesterday = y.toISOString().slice(0,10);
  if(student.lastActiveDate === yesterday){
    student.streak += 1;
  } else if (student.lastActiveDate === null){
    student.streak = 0; // streak starts once first day is *completed*, not just logged in
  } else {
    student.streak = 0;
  }
  // do not set lastActiveDate yet — that happens on first completed verb of the day,
  // to avoid inflating streaks just from logging in. Store a "seenToday" flag instead.
  student._seenToday = true;
  await saveStudent(student);
}

function logout(){
  state.student = null;
  state.screen = 'login';
  render();
}

function dayKeyForIndex(i){

  return d.toISOString().slice(0,10);
}

function progressRingSvg(done, total){
  const pct = total ? done/total : 0;
  const r = 26, c = 2*Math.PI*r;
  const offset = c * (1-pct);
  return `<svg class="progress-ring" viewBox="0 0 64 64">
    <circle cx="32" cy="32" r="${r}" fill="none" stroke="#E4EBE0" stroke-width="7"/>
    <circle cx="32" cy="32" r="${r}" fill="none" stroke="#7A9471" stroke-width="7"
      stroke-dasharray="${c}" stroke-dashoffset="${offset}" stroke-linecap="round"
      transform="rotate(-90 32 32)"/>
    <text x="32" y="37" text-anchor="middle" font-size="15" font-weight="700" fill="#2B2E26" font-family="Cormorant Garamond, serif">${Math.round(pct*100)}%</text>
  </svg>`;
}

// ============================================================
// QUIZ ENGINE
// ============================================================
// Picks up to `count` unique distractor values, excluding any that equal
// the correct answer (case/whitespace-insensitive) and de-duplicated among
// themselves — prevents e.g. "ρίχνω" appearing twice (βάλλω vs ἵημι both
// translate to "ρίχνω" as their first sense).
function pickDistractors(allValues, correctValue, count){
  const seen = new Set([norm(correctValue)]);
  const unique = [];
  for(const val of shuffle(allValues)){
    const key = norm(val);
    if(seen.has(key)) continue;
    seen.add(key);
    unique.push(val);
    if(unique.length >= count) break;
  }
  return unique;
}

function buildQuizQuestions(verb){
  const qs = [];
  // Q1: translation (multiple choice)
  const correctTranslation = verb.translation.split(',')[0].trim();
  const allTranslations = VERBS.filter(v=>v.id!==verb.id).map(v=>v.translation.split(',')[0].trim());
  const distractors = pickDistractors(allTranslations, correctTranslation, 3);
  const options = shuffle([correctTranslation, ...distractors]);
  qs.push({
    type:'mc',
    prompt: `Τι σημαίνει το <span class="hl">${escapeHtml(verb.lemma)}</span>;`,
    options,
    answer: correctTranslation,
  });

  // Q2: typed - present tense active (or middle if no active)
  const activeForms = verb.tenses.active;
  const mpForms = verb.tenses.middle_passive;
  if(activeForms && activeForms.present && activeForms.present !== '—'){
    qs.push({
      type:'type',
      prompt: `Γράψε τον <strong>Ενεστώτα</strong> (Ενεργ. Φωνή) του ρήματος «<span class="hl">${escapeHtml(verb.translation.split(',')[0].trim())}</span>»`,
      answer: firstForm(activeForms.present),
      acceptableAlternatives: allForms(activeForms.present),
    });
  } else if(mpForms && mpForms.present){
    qs.push({
      type:'type',
      prompt: `Γράψε τον <strong>Ενεστώτα</strong> του ρήματος «<span class="hl">${escapeHtml(verb.translation.split(',')[0].trim())}</span>»`,
      answer: firstForm(mpForms.present),
      acceptableAlternatives: allForms(mpForms.present),
    });
  }

  // Q3: typed - aorist (key principal part), prefer active, fallback middle/passive
  let aoristForm = (activeForms && activeForms.aorist) || (mpForms && mpForms.aorist);
  if(aoristForm && aoristForm !== '—'){
    qs.push({
      type:'type',
      prompt: `Ποιος είναι ο <strong>Αόριστος</strong> του <span class="hl">${escapeHtml(verb.lemma)}</span>;`,
      answer: firstForm(aoristForm),
      acceptableAlternatives: allForms(aoristForm),
    });
  }

  // Q4: stem (multiple choice against distractor stems)
  const correctStem = firstForm(verb.stem);
  const allStems = VERBS.filter(v=>v.id!==verb.id).map(v=>firstForm(v.stem));
  const wrongStems = pickDistractors(allStems, correctStem, 3);
  qs.push({
    type:'mc',
    prompt: `Ποιο είναι το <strong>θέμα</strong> του <span class="hl">${escapeHtml(verb.lemma)}</span>;`,
    options: shuffle([correctStem, ...wrongStems]),
    answer: correctStem,
  });

  // Q5: cognates recognition (multiple choice) - pick a real cognate vs distractors from other verbs
  const realCognate = firstForm(verb.cognates);
  const allCognates = VERBS.filter(v=>v.id!==verb.id).map(v=>firstForm(v.cognates));
  const wrongCognates = pickDistractors(allCognates, realCognate, 3);
  qs.push({
    type:'mc',
    prompt: `Ποια λέξη είναι <strong>ομόρριζη</strong> του <span class="hl">${escapeHtml(verb.lemma)}</span>;`,
    options: shuffle([realCognate, ...wrongCognates]),
    answer: realCognate,
  });

  return qs;
}
function firstForm(str){ return String(str||'').split(',')[0].replace(/\([^)]*\)/g,'').trim(); }
function allForms(str){ return String(str||'').split(',').map(s=>s.trim()); }
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function startQuiz(verbId){
  const verb = VERBS.find(v=>v.id===verbId);
  state.quiz = {
    verb,
    questions: buildQuizQuestions(verb),
    index: 0,
    correctCount: 0,
    answered: false,
  };
  state.screen = 'quiz';
  render();
}

function renderQuiz(){
  const q = state.quiz;
  const question = q.questions[q.index];
  const pct = Math.round((q.index / q.questions.length) * 100);

  let bodyHtml = '';
  if(question.type === 'mc'){
    bodyHtml = `<div class="quiz-options">
      ${question.options.map(opt => `<button class="quiz-option" data-opt="${escapeHtml(opt)}">${escapeHtml(opt)}</button>`).join('')}
    </div>`;
  } else {
    bodyHtml = `<div class="quiz-input-wrap">
      <input id="quizInput" class="quiz-input" type="text" placeholder="…" autocomplete="off" autocapitalize="off" spellcheck="false">
    </div>
    <button class="btn btn-sienna btn-block" id="submitTypeBtn">Έλεγξε ✓</button>`;
  }

  root.innerHTML = `
    <div class="app">
      <div class="screen">
        <div class="vd-header">
          <button class="back-btn" id="quizBackBtn">${ICONS.back}</button>
        </div>

        <div class="quiz-q-label">Ερώτηση ${q.index+1} από ${q.questions.length}</div>
        <div class="quiz-question">${question.prompt}</div>
        ${bodyHtml}
      </div>
    </div>
  `;

  document.getElementById('quizBackBtn').onclick = ()=>{ state.screen='verb'; render(); };

  if(question.type === 'mc'){
    document.querySelectorAll('.quiz-option').forEach(btn=>{
      btn.onclick = ()=> handleQuizAnswer(btn.dataset.opt, btn);
    });
  } else {
    const input = document.getElementById('quizInput');
    input.focus();
    input.addEventListener('keydown', e=>{ if(e.key==='Enter') handleQuizAnswer(input.value, input); });
    document.getElementById('submitTypeBtn').onclick = ()=> handleQuizAnswer(input.value, input);
  }
}

function handleQuizAnswer(givenValue, el){
  if(state.quiz.answered) return;
  const q = state.quiz;
  const question = q.questions[q.index];
  let isCorrect = false;

  if(question.type === 'mc'){
    isCorrect = (givenValue === question.answer);
    document.querySelectorAll('.quiz-option').forEach(btn=>{
      btn.disabled = true;
      if(btn.dataset.opt === question.answer) btn.classList.add('correct');
      else if(btn.dataset.opt === givenValue && !isCorrect) btn.classList.add('wrong');
    });
  } else {
    const alts = question.acceptableAlternatives || [question.answer];
    isCorrect = alts.some(a => norm(a) === norm(givenValue));
    el.classList.add(isCorrect ? 'correct' : 'wrong');
    el.disabled = true;
  }

  q.answered = true;
  if(isCorrect) q.correctCount += 1;

  showFeedback(isCorrect, question);
}

function showFeedback(isCorrect, question){
  const praises = ['Φανταστικά! 🌿','Το έμαθες! ✨','Άριστα! 🪶','Μπράβο σου! 🌟','Τέλειο!','Σπουδαία δουλειά!'];
  const praise = praises[Math.floor(Math.random()*praises.length)];

  let banner = document.querySelector('.feedback-banner');
  if(!banner){
    banner = document.createElement('div');
    banner.className = 'feedback-banner';
    document.body.appendChild(banner);
  }
  banner.className = `feedback-banner ${isCorrect ? 'ok':'bad'}`;
  banner.innerHTML = `
    <div class="feedback-left">
      <div class="feedback-icon">${isCorrect ? ICONS.check : ICONS.cross}</div>
      <div>
        <div class="feedback-text">${isCorrect ? praise : 'Σχεδόν!'}</div>
        ${!isCorrect ? `<div class="feedback-sub">Σωστό: ${escapeHtml(question.answer)}</div>` : ''}
      </div>
    </div>
    <button class="btn ${isCorrect?'btn-primary':'btn-sienna'} btn-sm" id="continueBtn">Συνέχεια</button>
  `;
  requestAnimationFrame(()=> banner.classList.add('show'));
  document.getElementById('continueBtn').onclick = nextQuizStep;

  // small success sound cue via Web Audio (no external asset needed)
  playTone(isCorrect);
}

function playTone(success){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = 'sine';
    o.frequency.value = success ? 880 : 220;
    g.gain.value = 0.06;
    o.connect(g); g.connect(ctx.destination);
    o.start();
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + (success?0.35:0.25));
    o.stop(ctx.currentTime + 0.4);
  }catch(e){/* audio not critical */}
}

async function nextQuizStep(){
  const banner = document.querySelector('.feedback-banner');
  if(banner) banner.classList.remove('show');

  const q = state.quiz;
  q.answered = false;
  q.index += 1;

  if(q.index >= q.questions.length){
    await finishQuiz();
    return;
  }
  render();
}

async function finishQuiz(){
  const q = state.quiz;
  const s = state.student;
  const passed = q.correctCount >= Math.ceil(q.questions.length * 0.6);

  s.totalAttempts += q.questions.length;
  s.totalCorrect += q.correctCount;

  if(passed && !s.completedVerbIds.includes(q.verb.id)){
    s.completedVerbIds.push(q.verb.id);
  }

  // streak + day log only counts once student actually completes a quiz
  const today = todayStr();
  if(!s.dayLog[today]) s.dayLog[today] = {verbsDone:[], correct:0, attempts:0};
  if(!s.dayLog[today].verbsDone.includes(q.verb.id)) s.dayLog[today].verbsDone.push(q.verb.id);
  s.dayLog[today].correct += q.correctCount;
  s.dayLog[today].attempts += q.questions.length;

  if(s.lastActiveDate !== today){
    s.lastActiveDate = today;
    if(s.streak === 0) s.streak = 1; // first completed day of a fresh streak
  }

  await saveStudent(s);
  state.screen = 'dayComplete';
  state.quiz.passed = passed;
  render();
}

    return;
  }

  container.innerHTML = `
    <input class="admin-search" id="adminSearch" placeholder="Αναζήτηση μαθητή...">
    <div id="studentList"></div>
  `;
  const listEl = document.getElementById('studentList');

  function draw(filter){
    const filtered = filter
      ? students.filter(s=> norm(s.name).includes(norm(filter)))
      : students;
    listEl.innerHTML = filtered.map(s=>{
      const pct = Math.round((s.completedVerbIds.length / VERBS.length) * 100);
      const accuracy = s.totalAttempts ? Math.round((s.totalCorrect/s.totalAttempts)*100) : 0;
      const daysActive = Object.keys(s.dayLog).length;
      return `<div class="student-card">
        <div class="student-row">
          <div>
            <div class="student-name">${escapeHtml(s.name)}</div>
            <div class="student-meta">Κωδικός: ${escapeHtml(s.pin)} · Εγγραφή: ${escapeHtml(s.createdAt)}</div>
          </div>
          <div class="pill streak">${ICONS.fire} ${s.streak}</div>
        </div>
        <div class="student-stats">
          <div class="sstat"><span class="sval">${s.completedVerbIds.length}/${VERBS.length}</span> ρήματα</div>
          <div class="sstat"><span class="sval">${accuracy}%</span> ακρίβεια</div>
          <div class="sstat"><span class="sval">${daysActive}</span> ημέρες ενεργός</div>
        </div>
        <div class="mini-bar"><div class="mini-bar-fill" style="width:${pct}%"></div></div>
      </div>`;
    }).join('');
  }
  draw('');
  document.getElementById('adminSearch').addEventListener('input', e=> draw(e.target.value));
}

// ============================================================
// BOOTSTRAP
// ============================================================
async function boot(){
  state.screen = 'boot';
  render();
  // small delay so the loading state is visible at least briefly
  await new Promise(r=>setTimeout(r, 250));
  state.screen = 'login';
  render();
}

boot();

</script>
</body>
</html>
